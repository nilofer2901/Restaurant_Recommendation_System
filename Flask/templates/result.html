<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Results</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; }
</style>
</head>

<body class="bg-gray-100 min-h-screen">

<!-- HEADER -->
<div style="display:flex; justify-content:space-between; align-items:center; background:white; padding:24px 40px; box-shadow:0 2px 6px rgba(0,0,0,0.1);">

    <h1 style="font-size:20px; font-weight:600;">Food Discovery</h1>

    <div style="display:flex; gap:20px;">
        <a href="/" style="color:#e11d48; font-weight:500; text-decoration:none;">
            Home
        </a>

        <a href="/web" style="color:#e11d48; font-weight:500; text-decoration:none;">
            New Search
        </a>
    </div>

</div>

<!-- LIST VIEW -->
<div class="p-10 space-y-6">

    {% for r in recommendation %}
    <div class="bg-white rounded-2xl shadow-md hover:shadow-lg transition flex overflow-hidden">

        <!-- IMAGE -->
        <div class="w-1/3 md:w-1/4">
            <img src="https://loremflickr.com/400/300/restaurant?lock={{ loop.index }}"
                 class="w-full h-full object-cover">
        </div>

        <!-- CONTENT -->
        <div class="p-6 flex flex-col justify-between w-full">

            <div>
                <div class="flex justify-between items-center mb-2">
                    <h3 class="font-semibold text-xl">
                        {{ r.Restaurant }}
                    </h3>

                    <span class="bg-green-100 text-green-700 px-3 py-1 rounded-full text-sm">
                        ★ {{ "%.1f"|format(r['Mean Rating']|float) }}
                    </span>
                </div>

                <p class="text-gray-500 mb-3">
                    {{ r.cuisines }}
                </p>
            </div>

            <div class="flex justify-between items-center">
                <span class="text-[#e11d48] font-semibold">
                    Recommended
                </span>

                <span class="text-gray-800 font-semibold text-lg">
                    ₹{{ r.cost }}
                </span>
            </div>

        </div>

    </div>
    {% endfor %}

</div>

</body>
</html>
